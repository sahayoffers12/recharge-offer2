<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Predictor</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial;
  background: #e5e7eb;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.phone {
  width: 360px;
  height: 640px;
  background: #f9fafb;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  padding: 15px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
  font-size: 16px;
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #22c55e;
  color: white;
  font-size: 18px;
}

.result {
  margin-top: 15px;
  background: white;
  padding: 15px;
  border-radius: 12px;
  text-align: center;
}

.green { color:#16a34a; }
.red { color:#dc2626; }
.violet { color:#9333ea; }

.number {
  font-size: 50px;
  font-weight: bold;
}
</style>

</head>

<body>

<div class="phone">
  <input type="text" id="input" placeholder="Enter numbers...">
  <button onclick="predict()">Predict</button>
  <div class="result" id="output">Result yahan dikhega</div>
</div>

<script>

let input = document.getElementById("input");

input.addEventListener("input", e=>{
  let val = e.target.value.replace(/[^0-9]/g,"");
  e.target.value = val.split("").join(",");
});

function getColor(n){
  if([1,3,7,9].includes(n)) return "green";
  if([2,4,6,8].includes(n)) return "red";
  return "violet";
}

function getSize(n){
  return n<=4?"small":"big";
}

function predict(){
  let arr = input.value.split(",").map(Number).filter(n=>!isNaN(n));

  if(arr.length < 10){
    alert("10+ numbers daalo");
    return;
  }

  let colorList = ["green","red","violet"];
  let sizeList = ["small","big"];

  let color = colorList[Math.floor(Math.random()*3)];
  let size = sizeList[Math.floor(Math.random()*2)];

  let pool = [];
  for(let i=0;i<=9;i++){
    if(getColor(i)===color && getSize(i)===size){
      pool.push(i);
    }
  }

  let number = pool[Math.floor(Math.random()*pool.length)];
  let conf = Math.floor(Math.random()*40)+50;

  document.getElementById("output").innerHTML = `
    <p class="${color}">${color.toUpperCase()}</p>
    <p>${size.toUpperCase()}</p>
    <div class="number">${number}</div>
    <p>Confidence: ${conf}%</p>
  `;
}

</script>

</body>
</html>
